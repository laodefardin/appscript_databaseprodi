<!-- styles_css.html — CSS dimasukkan ke file .html agar bisa di-include oleh GAS template -->
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

:root {
    --primary-red: #C62828;
    --dark-red: #B71C1C;
    --light-red: #FFEBEE;
    --white: #ffffff;
    --bg-color: #f8f9fa;
    --text-main: #2c3e50;
    --text-muted: #7f8c8d;
    --border-color: #e0e0e0;
    --shadow-soft: 0 4px 20px rgba(0, 0, 0, 0.05);
    --shadow-hover: 0 10px 30px rgba(198, 40, 40, 0.15);
    --transition: all 0.3s ease;
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
body { background-color: var(--bg-color); color: var(--text-main); line-height: 1.6; }

.glass {
    background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.4);
    box-shadow: var(--shadow-soft);
}

.btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 8px; padding: 10px 20px; border-radius: 8px; border: none;
    cursor: pointer; font-weight: 500; transition: var(--transition); font-size: 14px;
}
.btn-primary { background-color: var(--primary-red); color: var(--white); box-shadow: 0 4px 10px rgba(198, 40, 40, 0.2); }
.btn-primary:hover { background-color: var(--dark-red); box-shadow: var(--shadow-hover); transform: translateY(-2px); }
.btn-secondary { background-color: var(--white); color: var(--primary-red); border: 1px solid var(--primary-red); }
.btn-secondary:hover { background-color: var(--light-red); }
.btn-success { background-color: #2e7d32; color: white; }
.btn-success:hover { background-color: #1b5e20; }

.form-group { margin-bottom: 20px; }
.form-group label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 14px; color: var(--text-main); }
.form-control {
    width: 100%; padding: 12px 15px; border: 1px solid var(--border-color);
    border-radius: 8px; font-size: 14px; background-color: var(--white); transition: var(--transition);
}
.form-control:focus { outline: none; border-color: var(--primary-red); box-shadow: 0 0 0 3px rgba(198, 40, 40, 0.1); }

/* LOGIN SPLIT SCREEN */
.login-split-container {
    display: flex;
    height: 100vh;
    width: 100%;
    overflow: hidden;
    background: var(--white);
}

.login-left {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 1;
    background: var(--white);
    position: relative;
}

.login-card-new {
    width: 100%;
    max-width: 380px;
}

.login-right {
    flex: 1.2;
    position: relative;
    background: var(--bg-color);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: visible;
    z-index: 2;
}

/* Membuat lengkungan seperti wave separator di sebelah kiri slider gambar */
.wave-overlay {
    position: absolute;
    left: -2px;
    top: 0;
    height: 100%;
    width: 150px;
    background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 1000" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg"><path d="M0,0 C80,200 80,400 0,600 C-80,800 80,1000 0,1000 L0,0 Z" fill="%23ffffff"/></svg>');
    background-size: 100% 100%;
    z-index: 2;
}

.slider-container {
    width: 100%;
    height: 100%;
    position: relative;
}

.slide {
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0;
    left: 0;
    transition: opacity 1s ease-in-out;
}

.slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.fade {
    animation-name: fadePanLeftAnim;
    animation-duration: 5s;
    animation-timing-function: linear;
    animation-fill-mode: forwards;
    transform-origin: center center;
}

@keyframes fadePanLeftAnim {
    0% {
        opacity: 0.4;
        transform: scale(1.1) translateX(0);
    }
    15% {
        opacity: 1;
    }
    100% {
        opacity: 1;
        transform: scale(1.1) translateX(-3%);
    }
}

.slider-dots {
    position: absolute;
    bottom: 30px;
    width: 100%;
    text-align: center;
    z-index: 3;
}

.dot {
    cursor: pointer;
    height: 10px;
    width: 10px;
    margin: 0 5px;
    background-color: rgba(255,255,255,0.5);
    border-radius: 50%;
    display: inline-block;
    transition: background-color 0.6s ease;
}

.dot.active, .dot:hover {
    background-color: #ff8a00;
}

@media (max-width: 900px) {
    .login-right {
        display: none !important;
    }
}

/* DASHBOARD LAYOUT */
.dashboard-wrap { display: flex; height: 100vh; overflow: hidden; position: relative; }
.sidebar { width: 280px; background-color: var(--white); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; z-index: 100; transition: var(--transition); }
.brand-area { padding: 25px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 12px; justify-content: space-between; }
.brand-icon { width: 35px; height: 35px; border-radius: 8px; background: linear-gradient(135deg, var(--primary-red), var(--dark-red)); display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 16px; flex-shrink: 0;}
.brand-text h2 { font-size: 16px; font-weight: 700; color: var(--primary-red); }
.close-sidebar { display: none; background:none; border:none; color: var(--text-muted); font-size: 20px; cursor: pointer; }

.menu-container { flex: 1; overflow-y: auto; padding: 20px 0; }
.menu-section { margin-bottom: 25px; }
.menu-section-title { padding: 0 25px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 10px; font-weight: 600; }
.menu-item { padding: 12px 25px; display: flex; align-items: center; gap: 12px; color: var(--text-main); text-decoration: none; transition: var(--transition); font-weight: 500; font-size: 14px; border-left: 3px solid transparent; cursor: pointer; }
.menu-item i { font-size: 16px; color: var(--text-muted); transition: var(--transition); width: 25px; text-align: center; }
.menu-item:hover, .menu-item.active { background-color: var(--light-red); color: var(--primary-red); }
.menu-item.active { border-left-color: var(--primary-red); }
.menu-item:hover i, .menu-item.active i { color: var(--primary-red); }

.user-profile-sm { padding: 20px 25px; border-top: 1px solid var(--border-color); display: flex; align-items: center; gap: 12px; }
.avatar { width: 40px; height: 40px; border-radius: 50%; color: white; font-weight: 600; display:flex; align-items:center; justify-content:center; background: linear-gradient(135deg, var(--primary-red), var(--dark-red)); flex-shrink: 0;}
.user-info h4 { font-size: 14px; margin-bottom: 2px; }
.user-info p { font-size: 12px; color: var(--text-muted); }

.main-content { flex: 1; display: flex; flex-direction: column; background-color: var(--bg-color); overflow: hidden; }
.top-header { height: 70px; background-color: var(--white); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; }
.mobile-header { height: 60px; background-color: var(--white); border-bottom: 1px solid var(--border-color); display: none; align-items: center; justify-content: space-between; padding: 0 20px; }
.mobile-toggle { background: none; border: none; font-size: 20px; color: var(--primary-red); cursor: pointer; }
.header-title h3 { font-size: 18px; color: var(--text-main); }
.content-wrapper { flex: 1; overflow-y: auto; padding: 30px; }

/* Dashboard Cards */
.dash-cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 25px; }
.stat-card { background: linear-gradient(135deg, var(--primary-red), var(--dark-red)); color: white; padding: 25px; border-radius: 12px; box-shadow: var(--shadow-soft); display: flex; align-items: center; gap: 20px; transition: var(--transition); }
.stat-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); }
.stat-icon { font-size: 32px; opacity: 0.8; }
.stat-info h4 { font-size: 14px; font-weight: 500; opacity: 0.9; margin-bottom: 5px; }
.stat-info span { font-size: 28px; font-weight: 700; line-height: 1; }

.dash-content-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 25px; }

.card { background-color: var(--white); border-radius: 12px; box-shadow: var(--shadow-soft); padding: 25px; margin-bottom: 25px; }
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--border-color); flex-wrap: wrap; gap: 10px; }
.card-header.header-no-border { border-bottom: none; margin-bottom: 15px; padding-bottom: 0px; }
.card-title { font-size: 18px; font-weight: 600; color: var(--text-main); }

.login-log { margin-top: 15px; }
.login-log-item { padding: 12px 15px; border: 1px solid var(--border-color); border-radius:8px; display: flex; align-items: flex-start; gap: 15px; margin-bottom: 10px; }
.log-icon { font-size: 18px; color: #27ae60; margin-top: 2px; }
.log-details h5 { font-size: 14px; margin-bottom: 2px; color: var(--text-main); }
.log-details p { font-size: 12px; color: var(--text-muted); margin-bottom:2px;}
.log-details span { font-size: 11px; font-weight:600; color: var(--primary-red);}

.filter-bar { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; background-color: var(--bg-color); padding: 15px; border-radius: 8px; align-items: center; }
.filter-bar .form-group { margin-bottom: 0; display: flex; align-items: center; gap: 10px; }
.filter-bar label { margin-bottom: 0; white-space: nowrap; }

.table-responsive { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; min-width: 700px; }
th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid var(--border-color); }
th { background-color: var(--bg-color); font-weight: 600; font-size: 13px; text-transform: uppercase; }
td { font-size: 14px; vertical-align: middle; }
tbody tr { transition: var(--transition); }
tbody tr:hover { background-color: var(--light-red); }

.file-link { color: var(--primary-red); text-decoration: none; font-weight: 500; display: inline-flex; align-items: center; gap: 8px;}
.file-link:hover { text-decoration: underline; }

.badge { padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: 600; }
.badge-success { background-color: #e8f8f5; color: #1abc9c; }
.badge-file { background-color: #e3f2fd; color: #1976d2; display: inline-flex; gap: 5px; align-items: center; }
.badge-pdf { background-color: #ffebee; color: var(--primary-red); }
.badge-img { background-color: #e8f4f8; color: #0288d1; }
.badge-xls { background-color: #e8f5e9; color: #2e7d32; }

.action-btns { display: flex; gap: 8px; }
.btn-icon { width: 30px; height: 30px; border-radius: 6px; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: var(--transition); color: white; font-size: 12px; text-decoration: none; }
.btn-edit { background-color: #f39c12; }
.btn-delete { background-color: var(--primary-red); }
.btn-view { background-color: #3498db; }

.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; pointer-events: none; transition: var(--transition); }
.modal-overlay.active { opacity: 1; pointer-events: auto; }
.modal-content { width: 100%; max-width: 500px; background: var(--white); border-radius: 12px; padding: 30px; transform: translateY(-20px); transition: var(--transition); max-height: 90vh; overflow-y: auto; margin:20px; }
.modal-overlay.active .modal-content { transform: translateY(0); }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.modal-header h3 { color: var(--primary-red); }
.modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text-muted); }

.sidebar-overlay { position: fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); z-index:90; display:none; }
.sidebar-overlay.active { display:block; }

@media (max-width: 991px) { .dash-content-grid { grid-template-columns: 1fr; } }

@media (max-width: 768px) {
    .top-header { display: none; }
    .mobile-header { display: flex; }
    .sidebar { position: fixed; height: 100vh; left: -280px; }
    .sidebar.active { left: 0; }
    .close-sidebar { display: block; }
    .content-wrapper { padding: 15px; }
    .card { padding: 15px; }
    .filter-bar { flex-direction: column; align-items: stretch; }
    .filter-bar .form-group { flex-direction: column; align-items: stretch; }
}

/* DROP ZONE */
.drop-zone {
    border: 2px dashed var(--border-color); border-radius: 12px; padding: 25px;
    cursor: pointer; transition: var(--transition); position: relative; background: var(--bg-color);
}
.drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--primary-red); background: var(--light-red);
}
.drop-zone-input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: -1; }
.drop-zone-prompt { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; pointer-events: none; }
.drop-zone-file { display: flex; align-items: center; pointer-events: none; }
.drop-zone-file button { pointer-events: auto; }

@keyframes spin {
    0%   { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
</style>
