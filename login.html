<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistem Database Prodi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        <?!= include('styles_css'); ?>
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-bg-shape shape-1"></div>
        <div class="login-bg-shape shape-2"></div>
        
        <div class="login-card glass">
            <div class="login-header">
                <div style="width:60px; height:60px; background:linear-gradient(135deg, #C62828, #B71C1C); border-radius:14px; display:flex; align-items:center; justify-content:center; color:white; font-size:28px; margin:0 auto 15px;">
                    <i class="fa-solid fa-graduation-cap"></i>
                </div>
                <h1>DataProdi</h1>
                <p>Sistem Database Program Studi</p>
            </div>
            
            <div id="loginAlert" style="display:none; background:#ffebee; color:#c62828; padding:10px 15px; border-radius:8px; margin-bottom:15px; font-size:13px; text-align:center;">
                <i class="fa-solid fa-circle-exclamation"></i> <span id="loginAlertText"></span>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username"><i class="fa-solid fa-user" style="margin-right:5px; color:#C62828;"></i>Username</label>
                    <input type="text" id="username" class="form-control" placeholder="Masukkan username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password"><i class="fa-solid fa-lock" style="margin-right:5px; color:#C62828;"></i>Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Masukkan password" required autocomplete="current-password">
                </div>
                <button type="submit" id="btnLogin" class="btn btn-primary" style="width: 100%; margin-top: 10px; height:48px; font-size:15px;">
                    <i class="fa-solid fa-right-to-bracket"></i> Masuk Sistem
                </button>
            </form>
            
            <p style="text-align:center; margin-top:20px; font-size:12px; color:#7f8c8d;">
                &copy; 2024 DataProdi — Sistem Database Program Studi
            </p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            var username = document.getElementById('username').value.trim();
            var password = document.getElementById('password').value;
            var btn = document.getElementById('btnLogin');
            var alert = document.getElementById('loginAlert');
            var alertText = document.getElementById('loginAlertText');
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Memverifikasi...';
            alert.style.display = 'none';

            google.script.run
                .withSuccessHandler(function(result) {
                    if (result.success) {
                        // Simpan session info
                        sessionStorage.setItem('user', JSON.stringify(result.user));
                        // Redirect ke dashboard
                        var url = window.location.href.split('?')[0] + '?page=dashboard';
                        window.top.location.href = url;
                    } else {
                        alertText.innerText = result.message;
                        alert.style.display = 'block';
                        btn.disabled = false;
                        btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Masuk Sistem';
                    }
                })
                .withFailureHandler(function(err) {
                    alertText.innerText = 'Terjadi kesalahan server: ' + err.message;
                    alert.style.display = 'block';
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Masuk Sistem';
                })
                .loginUser(username, password);
        });
    </script>
</body>
</html>
